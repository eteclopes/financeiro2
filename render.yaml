services:
  - type: web
    name: financeiro-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://financeiro2-six.vercel.app
      - key: CORS_VERCEL_PROJECT
        value: financeiro2
      - key: CORS_VERCEL_TEAM
        value: eteclopes-projects
      - key: FRONTEND_URL
        value: https://financeiro2-six.vercel.app
      - key: APP_TIME_ZONE
        value: America/Sao_Paulo
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN_DAYS
        value: "30"
      - key: PASSWORD_RESET_EXPIRES_IN_HOURS
        value: "1"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_LIFETIME_PRICE_ID
        sync: false
      - key: STRIPE_API_VERSION
        value: 2026-06-24.dahlia
      - key: PRO_LIFETIME_PRICE_LABEL
        value: Oferta vitalícia
